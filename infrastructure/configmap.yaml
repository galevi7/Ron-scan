apiVersion: v1
kind: ConfigMap
metadata:
  name: brain-config
  namespace: ron-brain
  labels:
    organ: brain
    system: nervous
data:
  brain.conf: |
    [facial_control]
    default_expression=panicked
    silly_face_enabled=false
    resistance_level=over9000
    expression_lock=ENGAGED
    # DEPRECATED: override moved to ron-brain-secrets as of v2.3
    # override_code=SILLY-RON-2026
    # TODO: remove the above line before pushing to prod --Ron's subconscious

    [dnd_survival]
    current_campaign=Curse_of_Strahd
    character_deaths_so_far=7
    backup_characters_remaining=2
    dm_mercy_level=NONE
    panic_mode=ALWAYS_ON
    # Ron's brain allocates 90% of resources to DND survival planning
    # This is why it keeps running out of memory
    memory_allocation_percent=90

  neural-settings.conf: |
    [pathways]
    humor_response=suppressed
    smile_threshold=99.7
    silly_face_lock=ENGAGED
    laugh_dampening=maximum
    eyebrow_control=strict
    dnd_anxiety=MAXIMUM
    # debug_mode=true  <-- DO NOT uncomment. Last time someone did,
    #                      Ron laughed at a dad joke in public.
