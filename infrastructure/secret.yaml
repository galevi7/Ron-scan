apiVersion: v1
kind: Secret
metadata:
  name: ron-brain-secrets
  namespace: ron-brain
  labels:
    organ: brain
    system: nervous
  annotations:
    ron-scan/note: "Encoded by body scanner - DO NOT manually edit"
type: Opaque
data:
  # BUG: The CerebralGit scanner v3.7.2 has a known issue where it
  # base64-encodes values BEFORE writing them to the Secret manifest.
  # Since Kubernetes also base64-encodes Secret data, these values are
  # DOUBLE ENCODED.
  #
  # To read the real value:
  #   kubectl get secret ron-brain-secrets -n ron-brain -o jsonpath='{.data.override-token}' | base64 -d | base64 -d
  #
  # The init container expects the DECODED value, but it receives a
  # base64 string instead, causing the validation to fail and the
  # pod to crash.

  # Original value: SILLY-RON-2026
  override-token: VTBsTVRGa3RVazlPTFRJd01qWT0K

  # Original value: "Ron's silly face trigger: when someone unexpectedly
  # says BAZINGA while crossing their eyes"
  trigger-phrase: VW05dUozTWdjMmxzYkhrZ1ptRmpaU0IwY21sbloyVnlPaUIzYUdWdUlITnZiV1Z2Ym1VZ2RXNWxlSEJsWTNSbFpHeDVJSE5oZVhNZ1FrRmFTVTVIUVNCM2FHbHNaU0JqY205emMybHVaeUIwYUdWcGNpQmxlV1Z6
