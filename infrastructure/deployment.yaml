---
# ===================== BRAIN =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-processor
  namespace: ron-brain
  labels:
    app: brain-processor
    system: nervous
    organ: brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brain-processor
  template:
    metadata:
      labels:
        app: brain-processor
        organ: brain
        system: nervous
      annotations:
        ron-scan/expression: "panicked"
        ron-scan/current-obsession: "DND survival strategies"
    spec:
      containers:
        - name: dnd-survival-planner
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "==================================="
              echo " RON'S BRAIN PROCESSOR"
              echo " Status: OVERLOADED"
              echo " Current task: NOT DYING IN DND"
              echo "==================================="
              echo ""
              echo "[BRAIN] Loading DND survival strategies..."
              echo "[BRAIN] Strategy #1: Hide behind the paladin"
              echo "[BRAIN] Strategy #2: Never split the party"
              echo "[BRAIN] Strategy #3: Don't touch the glowing orb"
              echo "[BRAIN] Strategy #4: Always check for traps"
              echo "[BRAIN] Strategy #5: Never say 'it can't get worse'"
              echo "[BRAIN] Strategy #6: Stock up on healing potions"
              echo "[BRAIN] Strategy #7: Don't anger the DM"
              echo "[BRAIN] Strategy #8: Never open the mysterious book"
              echo "[BRAIN] Strategy #9: Keep a backup character ready"
              echo "[BRAIN] Strategy #10: DON'T PET THE OWLBEAR"
              echo ""
              echo "[BRAIN] WARNING: Too many strategies to process"
              echo "[BRAIN] What if the dragon has TWO heads??"
              echo "[BRAIN] What if the mimic IS the floor??"
              echo "[BRAIN] What if Stampfer won't save me??"
              echo "[BRAIN] FATAL: Brain overloaded. Cannot handle DND anxiety."
              echo "[BRAIN] Shutting down..."
              exit 1
          ports:
            - containerPort: 8080
              name: brain-api
            - containerPort: 8180
              name: nerve-receptor
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: brain-config
              mountPath: /etc/brain-config
      volumes:
        - name: brain-config
          configMap:
            name: brain-config
            defaultMode: 0755
---
# ===================== HEART =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-pump
  namespace: ron-heart
  labels:
    app: heart-pump
    system: cardiovascular
    organ: heart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heart-pump
  template:
    metadata:
      labels:
        app: heart-pump
        organ: heart
        system: cardiovascular
    spec:
      containers:
        - name: cardiac-engine
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "[HEART] Cardiac system online. BPM: 72 (resting)"
              while true; do
                echo "[$(date)] heartbeat | bpm=72 | emotion=calm"
                sleep 5
              done
          ports:
            - containerPort: 8081
              name: heart-api
            - containerPort: 8181
              name: nerve-receptor
          resources:
            limits:
              memory: "32Mi"
              cpu: "50m"
