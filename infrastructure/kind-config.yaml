kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ron-scan
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "body-zone=central-nervous-system"
    extraPortMappings:
      - containerPort: 31002
        hostPort: 31002
        protocol: TCP
      - containerPort: 31003
        hostPort: 31003
        protocol: TCP
  - role: worker
    labels:
      body-zone: upper-body
  - role: worker
    labels:
      body-zone: lower-body
